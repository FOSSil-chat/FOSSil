name: Build binaries

on:
  push:
    branches:
      - main

jobs:
  build:
    name: Build release binaries
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Install Rust
        run: |
          curl https://sh.rustup.rs -sSf | sh -s -- -y
          source $HOME/.cargo/env

      - name: Build release binaries
        run: |
          source $HOME/.cargo/env
          cargo build --release --all --all-features --locked

      - name: Package binaries
        run: |
          mkdir -p artifacts

          cp target/release/* artifacts/ || true

          tar -czf fossil-chat-linux-x86_64.tar.gz -C artifacts .

      - name: Upload binaries
        uses: actions/upload-artifact@v3
        with:
          name: fossil-chat-linux-x86_64
          path: fossil-chat-linux-x86_64.tar.gz
name: Build and Release

on:
  push:
    branches:
      - main

jobs:
  release:
    name: Build and publish release
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install Rust
        run: |
          curl https://sh.rustup.rs -sSf | sh -s -- -y
          echo "$HOME/.cargo/bin" >> $GITHUB_PATH

      - name: Create version tag
        id: version
        env:
          FORGEJO_TOKEN: ${{ secrets.FOSSIL_RELEASES }}
        run: |
          git config user.name "Codeberg Actions"
          git config user.email "actions@codeberg.org"

          git fetch --tags

          latest=$(git tag --list "v*" --sort=-v:refname | head -n 1)

          if [ -z "$latest" ]; then
            version="v0.0.1"
          else
            version=$(echo "$latest" | awk -F. '{print $1"."$2"."$3+1}')
          fi

          echo "Creating release $version"

          echo "version=$version" >> "$GITHUB_OUTPUT"

          git tag "$version"
          git push origin "$version"

      - name: Build release binaries
        run: |
          cargo build --release --all --all-features --locked

      - name: Package binaries
        run: |
          mkdir -p artifacts

          cp target/release/fossil-client artifacts/ || true
          cp target/release/fossil-server artifacts/ || true

          tar -czf fossil-chat-linux-x86_64.tar.gz -C artifacts .

      - name: Create Codeberg Release
        uses: https://code.forgejo.org/actions/forgejo-release@v2
        with:
          token: ${{ secrets.FOSSIL_RELEASES }}
          direction: upload
          release-dir: .
          files: |
            fossil-chat-linux-x86_64.tar.gz
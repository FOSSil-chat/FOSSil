name: Build and Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    name: Build and publish release
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install Rust
        run: |
          curl https://sh.rustup.rs -sSf | sh -s -- -y
          echo "$HOME/.cargo/bin" >> $GITHUB_PATH

      - name: Cache Rust dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Test
        run: |
          source "$HOME/.cargo/env"
          cargo test --all --locked

      - name: Build release binaries
        run: |
          source "$HOME/.cargo/env"
          cargo build --release --all --all-features --locked

      - name: Package binaries
        run: |
          mkdir -p artifacts

          cp target/release/fossil-client artifacts/
          cp target/release/fossil-server artifacts/

          tar -czf fossil-chat-linux-x86_64.tar.gz -C artifacts .

          sha256sum fossil-chat-linux-x86_64.tar.gz > SHA256SUMS

      - name: Create Codeberg Release
        uses: https://code.forgejo.org/actions/forgejo-release@v2
        with:
          token: ${{ secrets.FOSSIL_RELEASES }}
          direction: upload
          tag: ${{ github.ref_name }}
          release-dir: .
          files: |
            fossil-chat-linux-x86_64.tar.gz
            SHA256SUMS
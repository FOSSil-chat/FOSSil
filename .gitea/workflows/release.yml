name: Build and Release

on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  release:
    name: Build and publish release
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install Rust
        run: |
          curl https://sh.rustup.rs -sSf | sh -s -- -y
          echo "$HOME/.cargo/bin" >> $GITHUB_PATH

      - name: Cache Rust dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Create version tag
        id: version
        run: |
          git config user.name "Codeberg Actions"
          git config user.email "actions@codeberg.org"

          git fetch --tags

          latest=$(git tag --list "v*" --sort=-v:refname | head -n 1)

          if [ -z "$latest" ]; then
            version="v0.0.1"
          else
            major=$(echo "$latest" | cut -d. -f1 | tr -d 'v')
            minor=$(echo "$latest" | cut -d. -f2)
            patch=$(echo "$latest" | cut -d. -f3)

            patch=$((patch + 1))

            version="v${major}.${minor}.${patch}"
          fi

          echo "Creating tag: $version"

          git tag "$version"
          git push origin "$version"

          echo "version=$version" >> "$GITHUB_OUTPUT"

      - name: Build release binaries
        run: |
          cargo build --release --all --all-features --locked

      - name: Package binaries
        run: |
          mkdir -p artifacts

          cp target/release/fossil-client artifacts/ || true
          cp target/release/fossil-server artifacts/ || true

          tar -czf fossil-chat-linux-x86_64.tar.gz -C artifacts .

      - name: Create Codeberg Release
        uses: https://code.forgejo.org/actions/forgejo-release@v2
        with:
          token: ${{ secrets.FOSSIL_RELEASES }}
          direction: upload
          tag: ${{ steps.version.outputs.version }}
          release-dir: .
          files: |
            fossil-chat-linux-x86_64.tar.gz